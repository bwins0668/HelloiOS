name: iOS Build (Device, unsigned)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned device IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for Device (unsigned)
        run: |
          xcodebuild \
            -project HelloiOS.xcodeproj \
            -scheme HelloiOS \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            SYMROOT=$PWD/build \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package as unsigned IPA
        run: |
          APP_PATH=$(find "$PWD/build" -name "HelloiOS.app" -type d | head -1)
          echo "✅ 找到: $APP_PATH"
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          cd Payload && zip -r ../HelloiOS-unsigned.ipa * && cd ..
          ls -lh HelloiOS-unsigned.ipa
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: HelloiOS-unsigned.ipa
          path: HelloiOS-unsigned.ipa
          retention-days: 30
