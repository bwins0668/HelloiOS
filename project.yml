name: HelloiOS
options:
  bundleIdPrefix: com.coco.helloiOS
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  HelloiOS:
    type: application
    platform: iOS
    sources:
      - HelloiOS
    settings:
      base:
        INFOPLIST_FILE: HelloiOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.coco.helloiOS
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
